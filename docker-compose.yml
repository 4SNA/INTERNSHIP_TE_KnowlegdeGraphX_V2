version: '3.8'

services:
  postgres:
    # ⚠️ CRITICAL: Upgraded from standard postgres:15 to pgvector/pgvector:pg15. 
    # Standard Postgres 15 does NOT contain the vector matrix binaries required by KnowledgeGraphX!
    image: pgvector/pgvector:pg15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=knowledgegraphx
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - kgx-network
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - kgx-network
    restart: unless-stopped

networks:
  kgx-network:
    driver: bridge
